name: Setup Wild KSU
description: Download and configure Wild KSU with version tracking
inputs:
  ksu_commit:
    description: "KernelSU-Next ref/commit (optional, defaults to dev)"
    required: false
    default: ""

runs:
  using: composite
  steps:
    - name: Download Wild KSU
      shell: bash
      working-directory: ${{ github.workspace }}/kernel
      run: |
        set -euo pipefail

        TARGET_REF="${{ inputs.ksu_commit }}"
        if [ -z "$TARGET_REF" ]; then TARGET_REF="dev"; fi

        curl -LSs "https://raw.githubusercontent.com/KernelSU-Next/KernelSU-Next/dev/kernel/setup.sh" | bash -s dev

        if [ "$TARGET_REF" != "dev" ]; then
          cd KernelSU-Next
          if git rev-parse --is-shallow-repository >/dev/null 2>&1 && git rev-parse --is-shallow-repository | grep -q true; then
            git fetch --unshallow --tags --prune || true
          fi
          git fetch --all --tags --prune

          if git checkout "$TARGET_REF" 2>/dev/null; then
            :
          elif git checkout "origin/$TARGET_REF" 2>/dev/null; then
            :
          elif git checkout "refs/tags/$TARGET_REF" 2>/dev/null; then
            :
          else
            echo "Error: could not checkout KernelSU-Next ref/commit/tag: $TARGET_REF"
            exit 1
          fi
          cd "$GITHUB_WORKSPACE/kernel"
        fi
        
        cd KernelSU-Next/kernel
        
        COMMITS_COUNT=$(/usr/bin/git rev-list --count HEAD)
        BASE_VERSION=30000
        KSU_VERSION=$(expr $COMMITS_COUNT "+" $BASE_VERSION)
        sed -i "s/^KSU_VERSION_FALLBACK := 1$/KSU_VERSION_FALLBACK := ${KSU_VERSION}/" Kbuild

        KSU_GIT_TAG="$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.1")"
        sed -i "s/^KSU_VERSION_TAG_FALLBACK := v0.0.1$/KSU_VERSION_TAG_FALLBACK := ${KSU_GIT_TAG}/" Kbuild

    - name: Fix KSU-Next Hook Symbols
      shell: bash
      working-directory: ${{ github.workspace }}/kernel/KernelSU-Next
      run: |
        # Ensure ksu_input_hook and ksu_init_rc_hook are defined in KSU-Next.
        # The mega-patch (ksun-0daf55582) tries to add them but may fail silently
        # on newer commits where the file structure has changed.
        # We also add ksu_is_input_hook_enabled() and ksu_is_init_rc_hook_enabled()
        # wrappers since newer susfs4ksu patches reference those function names.

        HOOK_COMPAT_FILE="kernel/ksu_hook_compat.c"

        if ! grep -rq "ksu_input_hook" kernel/ 2>/dev/null; then
          echo "ksu_input_hook not found in KSU-Next sources, injecting..."
          cat > "$HOOK_COMPAT_FILE" << 'EOF'
#include <linux/kernel.h>

bool ksu_input_hook __read_mostly = true;
bool ksu_init_rc_hook __read_mostly = true;
bool ksu_execveat_hook __read_mostly = true;

bool ksu_is_input_hook_enabled(void) { return ksu_input_hook; }
bool ksu_is_init_rc_hook_enabled(void) { return ksu_init_rc_hook; }

EXPORT_SYMBOL(ksu_input_hook);
EXPORT_SYMBOL(ksu_init_rc_hook);
EXPORT_SYMBOL(ksu_execveat_hook);
EXPORT_SYMBOL(ksu_is_input_hook_enabled);
EXPORT_SYMBOL(ksu_is_init_rc_hook_enabled);
EOF
          # Add to Kbuild
          echo "ksu-objs += ksu_hook_compat.o" >> kernel/Kbuild
          echo "Injected ksu_hook_compat.c into KSU-Next"
        else
          echo "ksu_input_hook already present, checking for function wrappers..."
          # Add wrappers if the functions don't exist yet
          if ! grep -rq "ksu_is_input_hook_enabled" kernel/ 2>/dev/null; then
            cat > "$HOOK_COMPAT_FILE" << 'EOF'
#include <linux/kernel.h>

extern bool ksu_input_hook __read_mostly;
extern bool ksu_init_rc_hook __read_mostly;

bool ksu_is_input_hook_enabled(void) { return ksu_input_hook; }
bool ksu_is_init_rc_hook_enabled(void) { return ksu_init_rc_hook; }

EXPORT_SYMBOL(ksu_is_input_hook_enabled);
EXPORT_SYMBOL(ksu_is_init_rc_hook_enabled);
EOF
            echo "ksu-objs += ksu_hook_compat.o" >> kernel/Kbuild
            echo "Injected ksu_is_input_hook_enabled wrapper into KSU-Next"
          else
            echo "All hook symbols already present, nothing to do."
          fi
        fi

    - name: Enable KernelSU Config
      shell: bash
      working-directory: ${{ github.workspace }}/kernel
      run: |
        cat >> "${{ github.workspace }}/wild_gki.fragment" << 'EOF'
        # KernelSU Configuration
        CONFIG_KSU=y
        EOF
    
    - name: Extract KSU Version Info
      id: ksu-version
      shell: bash
      working-directory: ${{ github.workspace }}/kernel/KernelSU-Next
      run: |
        # Extract and export KSU version info
        KSU_GIT_VERSION=$(git rev-list --count HEAD 2>/dev/null)
        KSU_GIT_TAG=$(git describe --tags --abbrev=0 2>/dev/null)
        KSU_COMMIT=$(git rev-parse --short HEAD 2>/dev/null)
        KSU_VERSION=$((30000 + KSU_GIT_VERSION))
        
        echo "KSU_GIT_TAG=$KSU_GIT_TAG" >> $GITHUB_ENV
        echo "KSU_VERSION=$KSU_VERSION" >> $GITHUB_ENV
        echo "KSU_COMMIT=$KSU_COMMIT" >> $GITHUB_ENV
